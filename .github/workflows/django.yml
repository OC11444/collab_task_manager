name: Django CI/CD Workflow (Backend Gatekeeper)

on:
  push:
    branches: ["main", "dev", "feature/**"] # Now tracks your feature branches
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:9.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" #  matches our Docker Fortress...pweep

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dj-database-url # Ensures database logic works in CI

      - name: Run Migrations and Tests
        env:
          # Using the exact same naming convention as your settings.py
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: "True"
          ALLOWED_HOSTS: "127.0.0.1 localhost"
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: "root" # GitHub Actions MySQL uses root by default
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
          FRONTEND_URL: "https://oc11444.github.io/academic-task-manager/https://oc11444.github.io/academic-task-manager/"
        run: |
          python manage.py migrate
          python manage.py test